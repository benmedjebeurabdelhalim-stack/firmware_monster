[env:esp32-s3-devkitc-1]
extends = env
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.arduino.memory_type = qio_qspi ; تفعيل سرعة النقل العالية للـ 16MB و 8MB PSRAM
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv ; توجيه المترجم لاستخدام كامل مساحة التخزين
build_flags = 
    ${env.build_flags}
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DHAS_SCREEN=1
    -DHAS_TOUCH=1
